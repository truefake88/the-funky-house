<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaggu Bhai School App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { padding: 8px; margin: 5px; width: 80%; }
        button { padding: 10px; background: green; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🏫 Jaggu Bhai School Management</h1>

    <div class="box">
        <h3>Naya Student Jodein</h3>
        <input type="text" id="s_name" placeholder="Student ka Naam">
        <input type="text" id="s_class" placeholder="Class (e.g. 10th)">
        <input type="number" id="s_roll" placeholder="Roll Number">
        <button onclick="addStudent()">Save Karo</button>
    </div>

    <div class="box">
        <h3>Students ki List</h3>
        <div id="student-list">Loading...</div>
    </div>

    <script>
        // Tumhara naya Supabase Connection
        const supabaseUrl = 'https://xxbuhdezzesdwgsbzrfh.supabase.co';
        const supabaseKey = 'Sb_publishable_F1fuVfJj5NLrWdcIRWK_Gg_huFnID5y';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Data Save karne ke liye
        async function addStudent() {
            const name = document.getElementById('s_name').value;
            const s_class = document.getElementById('s_class').value;
            const roll = document.getElementById('s_roll').value;

            const { error } = await _supabase
                .from('students')
                .insert([{ name: name, class: s_class, roll_no: roll }]);

            if (error) alert("Galti: " + error.message);
            else { alert("Student save ho gaya!"); fetchStudents(); }
        }

        // Data dikhane ke liye
        async function fetchStudents() {
            const { data, error } = await _supabase.from('students').select('*');
            const listDiv = document.getElementById('student-list');
            
            if (error) listDiv.innerHTML = error.message;
            else {
                listDiv.innerHTML = "";
                data.forEach(s => {
                    listDiv.innerHTML += `<p>✅ ${s.name} - Class: ${s.class} (Roll: ${s.roll_no})</p>`;
                });
            }
        }
        fetchStudents();
    </script>
</body>
</html>
