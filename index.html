<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FUNKY HOUSE - Swad Jo Dil Jeet Le</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121826; color: white; text-align: center; margin: 0; padding: 10px; }
        .header { color: #FFD700; font-size: 32px; font-weight: bold; margin-top: 20px; }
        .tagline { font-style: italic; color: #a0a0a0; }
        .btn-location { background: #2563eb; color: white; padding: 12px 25px; border-radius: 50px; border: none; margin: 20px 0; display: inline-flex; align-items: center; text-decoration: none; }
        .menu-card { background: #1e293b; border-radius: 20px; overflow: hidden; margin-bottom: 20px; position: relative; text-align: left; }
        .price-tag { position: absolute; top: 15px; right: 15px; background: #FFD700; color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .dish-img { width: 100%; height: 250px; object-fit: cover; }
        .dish-info { padding: 15px; background: #1e293b; }
        .dish-name { font-size: 20px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">THE FUNKY HOUSE</div>
    <div class="tagline">Swad Jo Dil Jeet Le</div>

    <a href="https://maps.google.com" class="btn-location">📍 Find Our Location</a>

    <div id="menu-container">
        </div>

    <script>
        const supabaseUrl = 'https://xxbuhdezzesdwgsbzrfh.supabase.co';
        const supabaseKey = 'Sb_publishable_F1fuVfJj5NLrWdcIRWK_Gg_huFnID5y';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadMenu() {
            const { data, error } = await _supabase.from('dishes').select('*');
            const container = document.getElementById('menu-container');
            
            if (error) {
                container.innerHTML = "<p>Error: " + error.message + "</p>";
            } else {
                container.innerHTML = "";
                data.forEach(dish => {
                    container.innerHTML += `
                        <div class="menu-card">
                            <div class="price-tag">रु ${dish.p}</div>
                            <img src="${dish.i}" class="dish-img" onerror="this.src='https://via.placeholder.com/300'">
                            <div class="dish-info">
                                <div class="dish-name">${dish.n}</div>
                            </div>
                        </div>`;
                });
            }
        }
        loadMenu();
    </script>
</body>
</html>
