<div id="adminModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4 text-black">
    <div class="bg-white w-full max-w-md p-8 rounded-[40px]">
        <h3 class="text-2xl font-black mb-4 uppercase">Add New Dish</h3>
        <input id="n" type="text" placeholder="Dish Name (e.g. Paneer Chilli)" class="w-full border p-4 rounded-2xl mb-3 outline-none">
        <input id="p" type="number" placeholder="Price (NPR रु)" class="w-full border p-4 rounded-2xl mb-3 outline-none">
        <input id="i" type="text" placeholder="Photo Link (Direct URL)" class="w-full border p-4 rounded-2xl mb-3 outline-none">
        
        <label class="block mb-2 font-bold ml-2">Choose Category:</label>
        <select id="cat" class="w-full border p-4 rounded-2xl mb-6 bg-gray-50 outline-none">
            <option value="veg">🟢 Veg</option>
            <option value="nonveg">🔴 Non-Veg</option>
            <option value="cocktail">🍸 Cocktail</option>
            <option value="mocktail">🥤 Mocktail</option>
        </select>

        <div class="flex gap-3">
            <button onclick="saveToSupabase()" class="bg-yellow-500 w-full py-5 rounded-3xl font-black text-xl shadow-lg active:scale-95 transition">Save Item</button>
            <button onclick="closeAdmin()" class="bg-gray-200 w-1/3 py-5 rounded-3xl font-bold">Close</button>
        </div>
    </div>
</div>

<script>
    // Ye function category ke hisaab se filter karega
    function filterCategory(cat) {
        const buttons = document.querySelectorAll('.category-btn');
        if(cat === 'all') {
            renderItems(allDishes);
        } else {
            // Sirf wahi dikhayega jo category se match karega
            const filtered = allDishes.filter(d => d.category === cat);
            renderItems(filtered);
        }
    }

    // Naya item save karte waqt category bhi save hogi
    async function saveToSupabase() {
        const n = document.getElementById('n').value;
        const p = document.getElementById('p').value;
        const i = document.getElementById('i').value;
        const category = document.getElementById('cat').value; // Category pick karega
        
        if(n && p && i) {
            const { error } = await _supabase.from('dishes').insert([{ n, p, i, category }]);
            if (error) alert("Error: " + error.message);
            else { alert("Dish successfully added!"); location.reload(); }
        } else {
            alert("Please fill all details!");
        }
    }
</script>
