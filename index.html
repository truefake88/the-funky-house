<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Funky House | Bhaktapur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white pb-20 font-sans">

    <header class="text-center py-10 bg-gradient-to-b from-yellow-500/20 to-transparent px-4">
        <h1 class="text-6xl font-black text-yellow-400 uppercase tracking-tighter">THE FUNKY HOUSE</h1>
        <div class="mt-6 max-w-md mx-auto">
            <input type="text" id="searchBar" onkeyup="filterMenu()" placeholder="🔍 Search dish..." 
            class="w-full p-4 rounded-2xl bg-slate-800 border border-white/10 text-white outline-none focus:border-yellow-400">
        </div>
    </header>

    <div class="flex flex-wrap justify-center gap-2 mb-8 px-4">
        <button onclick="filterCategory('all')" class="bg-yellow-500 text-black px-4 py-2 rounded-full font-bold">All</button>
        <button onclick="filterCategory('veg')" class="bg-green-600 px-4 py-2 rounded-full font-bold text-xs">🟢 Veg</button>
        <button onclick="filterCategory('nonveg')" class="bg-red-600 px-4 py-2 rounded-full font-bold text-xs">🔴 Non-Veg</button>
        <button onclick="filterCategory('cocktail')" class="bg-purple-600 px-4 py-2 rounded-full font-bold text-xs">🍸 Cocktail</button>
        <button onclick="filterCategory('mocktail')" class="bg-blue-600 px-4 py-2 rounded-full font-bold text-xs">🥤 Mocktail</button>
    </div>

    <div id="menu-container" class="max-w-md mx-auto px-4 space-y-8"></div>

    <button onclick="openAdmin()" class="fixed bottom-6 right-6 w-16 h-16 bg-yellow-500 text-black rounded-full shadow-2xl z-50 text-2xl flex items-center justify-center font-bold">
        <i class="fas fa-plus"></i>
    </button>

    <div id="adminModal" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white text-black w-full max-w-md p-8 rounded-[40px]">
            <h3 class="text-2xl font-black mb-4">Add New Item</h3>
            <input id="n" type="text" placeholder="Dish Name" class="w-full border p-3 rounded-xl mb-3">
            <input id="p" type="number" placeholder="Price (रु)" class="w-full border p-3 rounded-xl mb-3">
            <input id="i" type="text" placeholder="Photo Link" class="w-full border p-3 rounded-xl mb-3">
            <select id="cat" class="w-full border p-3 rounded-xl mb-6">
                <option value="veg">Veg</option>
                <option value="nonveg">Non-Veg</option>
                <option value="cocktail">Cocktail</option>
                <option value="mocktail">Mocktail</option>
            </select>
            <div class="flex gap-2">
                <button onclick="saveToSupabase()" class="bg-yellow-500 w-full py-4 rounded-2xl font-bold">Save</button>
                <button onclick="closeAdmin()" class="bg-gray-200 w-1/3 py-4 rounded-2xl">Close</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://xxbuhdezzesdwgsbzrfh.supabase.co';
        const supabaseKey = 'Sb_publishable_F1fuVfJj5NLrWdcIRWK_Gg_huFnID5y';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let allDishes = [];

        async function loadMenu() {
            const { data, error } = await _supabase.from('dishes').select('*');
            if (!error) { allDishes = data; renderItems(data); }
        }

        function renderItems(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div class="relative bg-slate-800 rounded-[35px] overflow-hidden border border-white/5 shadow-2xl">
                    <img src="${item.i}" class="w-full h-72 object-cover">
                    <div class="absolute top-4 right-4 bg-yellow-400 text-black px-4 py-1 rounded-full font-black">रु ${item.p}</div>
                    <div class="p-6 font-black text-2xl uppercase">${item.n}</div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            if(cat === 'all') renderItems(allDishes);
            else renderItems(allDishes.filter(d => d.category === cat));
        }

        function filterMenu() {
            let val = document.getElementById('searchBar').value.toLowerCase();
            renderItems(allDishes.filter(d => d.n.toLowerCase().includes(val)));
        }

        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        async function saveToSupabase() {
            const n = document.getElementById('n').value;
            const p = document.getElementById('p').value;
            const i = document.getElementById('i').value;
            const category = document.getElementById('cat').value;
            
            const { error } = await _supabase.from('dishes').insert([{ n, p, i, category }]);
            if (error) alert(error.message);
            else { alert("Dish Saved!"); location.reload(); }
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
