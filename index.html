<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Funky House | Bhaktapur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 text-white pb-24 font-sans selection:bg-yellow-400 selection:text-black">

    <header class="text-center py-16 bg-gradient-to-b from-yellow-500/20 via-slate-900 to-slate-900 px-4">
        <h1 class="text-7xl font-black text-yellow-400 uppercase tracking-tighter mb-2">THE FUNKY HOUSE</h1>
        <p class="text-slate-400 tracking-[0.2em] font-medium mb-8">PREMIUM RESTRO & BAR | BHAKTAPUR</p>
        
        <div class="mt-8 max-w-md mx-auto relative">
            <input type="text" id="searchBar" onkeyup="filterMenu()" placeholder="Search your favorite dish..." 
            class="w-full p-5 rounded-2xl bg-slate-800/50 border border-white/10 text-white outline-none focus:border-yellow-400 text-lg shadow-2xl backdrop-blur-md">
        </div>
    </header>

    <div class="flex flex-wrap justify-center gap-3 mb-12 px-4 sticky top-4 z-50">
        <button onclick="filterCategory('all')" class="bg-yellow-500 text-black px-8 py-3 rounded-full font-black shadow-xl hover:scale-105 transition">All</button>
        <button onclick="filterCategory('veg')" class="bg-slate-800 border border-green-500/30 text-green-400 px-6 py-3 rounded-full font-bold shadow-lg hover:bg-green-600 hover:text-white transition">🟢 Veg</button>
        <button onclick="filterCategory('nonveg')" class="bg-slate-800 border border-red-500/30 text-red-400 px-6 py-3 rounded-full font-bold shadow-lg hover:bg-red-600 hover:text-white transition">🔴 Non-Veg</button>
        <button onclick="filterCategory('cocktail')" class="bg-slate-800 border border-purple-500/30 text-purple-400 px-6 py-3 rounded-full font-bold shadow-lg hover:bg-purple-600 hover:text-white transition">🍸 Cocktail</button>
    </div>

    <div id="menu-container" class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-20">
        </div>

    <section class="max-w-2xl mx-auto px-4 mb-20">
        <div class="glass-card p-8 rounded-[40px] shadow-2xl border border-yellow-500/20">
            <h2 class="text-4xl font-black text-center mb-8 text-yellow-400 uppercase">Book A Table</h2>
            <form id="bookingForm" class="space-y-4">
                <input type="text" id="guestName" placeholder="Your Name" required class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 focus:border-yellow-400 outline-none">
                <input type="tel" id="guestPhone" placeholder="Phone Number" required class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 focus:border-yellow-400 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="bookDate" required class="p-4 rounded-xl bg-slate-900/50 border border-white/10 focus:border-yellow-400 outline-none text-white">
                    <input type="number" id="guestCount" placeholder="Guests" min="1" required class="p-4 rounded-xl bg-slate-900/50 border border-white/10 focus:border-yellow-400 outline-none">
                </div>
                <button type="submit" class="w-full py-5 bg-yellow-400 text-black font-black rounded-xl text-xl shadow-xl hover:bg-yellow-300 transition uppercase">Confirm Booking</button>
            </form>
        </div>
    </section>

    <footer class="bg-slate-950 py-12 px-4 border-t border-white/5 text-center">
        <div class="flex justify-center gap-8 mb-8 text-3xl">
            <a href="#" class="text-white hover:text-yellow-400 transition"><i class="fab fa-facebook"></i></a>
            <a href="#" class="text-white hover:text-yellow-400 transition"><i class="fab fa-instagram"></i></a>
            <a href="#" class="text-white hover:text-yellow-400 transition"><i class="fas fa-map-marker-alt"></i></a>
        </div>
        <p class="text-slate-500 font-bold mb-2">The Funky House, Bhaktapur, Nepal</p>
        <p class="text-slate-600 text-sm">© 2026 THE FUNKY HOUSE. All Rights Reserved.</p>
    </footer>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-900/80 backdrop-blur-xl border-t border-white/10 p-4 flex justify-around items-center md:hidden z-[100]">
        <a href="tel:+977XXXXXXXXXX" class="flex flex-col items-center text-yellow-400">
            <i class="fas fa-phone text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">CALL</span>
        </a>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="bg-yellow-400 text-black p-4 rounded-full -mt-12 shadow-2xl border-4 border-slate-900">
            <i class="fas fa-utensils text-xl"></i>
        </button>
        <a href="https://maps.google.com" target="_blank" class="flex flex-col items-center text-yellow-400">
            <i class="fas fa-location-arrow text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">MAPS</span>
        </a>
    </div>

    <script>
        // Supabase Connection
        const supabaseUrl = 'https://xxbuhdezzesdwgsbzrfh.supabase.co';
        const supabaseKey = 'Sb_publishable_F1fuVfJj5NLrWdcIRWK_Gg_huFnID5y';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let allDishes = [];

        async function loadMenu() {
            const { data, error } = await _supabase.from('dishes').select('*');
            if (!error) {
                allDishes = data;
                renderItems(data);
            }
        }

        function renderItems(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div class="group relative bg-slate-800 rounded-[35px] overflow-hidden border border-white/5 shadow-2xl transition-all duration-500 hover:-translate-y-2">
                    <div class="relative h-64 overflow-hidden">
                        <img src="${item.i}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110" 
                             onerror="this.src='https://via.placeholder.com/400x300?text=Delicious+Food'">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent opacity-80"></div>
                        <div class="absolute top-4 right-4 bg-yellow-400 text-black px-4 py-1.5 rounded-full font-black text-lg shadow-lg">
                            रु ${item.p}
                        </div>
                    </div>
                    <div class="p-6">
                        <h2 class="text-2xl font-black uppercase tracking-tight text-white mb-2">${item.n}</h2>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full ${item.category === 'veg' ? 'bg-green-500' : 'bg-red-500'}"></span>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">${item.category}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Booking Logic
        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Processing...";
            
            const bookingData = {
                name: document.getElementById('guestName').value,
                phone: document.getElementById('guestPhone').value,
                date: document.getElementById('bookDate').value,
                guests: document.getElementById('guestCount').value
            };

            const { error } = await _supabase.from('bookings').insert([bookingData]);
            
            if (!error) {
                alert("Table Booked Successfully! See you soon at The Funky House.");
                e.target.reset();
            } else {
                alert("Something went wrong. Please try again.");
            }
            btn.innerText = "Confirm Booking";
        };

        function filterCategory(cat) {
            if(cat === 'all') renderItems(allDishes);
            else {
                const filtered = allDishes.filter(d => d.category === cat);
                renderItems(filtered);
            }
        }

        function filterMenu() {
            let val = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allDishes.filter(d => d.n.toLowerCase().includes(val));
            renderItems(filtered);
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
