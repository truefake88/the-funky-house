<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Funky House | Bhaktapur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white pb-24 font-sans">

    <header class="text-center py-12 bg-gradient-to-b from-yellow-500/10 to-transparent">
        <h1 class="text-6xl font-black text-yellow-400 tracking-tighter uppercase">THE FUNKY HOUSE</h1>
        
        <div class="mt-8 max-w-md mx-auto px-4">
            <input type="text" id="searchBar" onkeyup="filterMenu()" placeholder="🔍 Search your favorite dish..." 
            class="w-full p-4 rounded-2xl bg-slate-900 border border-white/10 text-white outline-none focus:ring-2 focus:ring-yellow-400">
        </div>
    </header>

    <div class="flex flex-wrap justify-center gap-3 mb-10 px-4">
        <button onclick="filterCategory('all')" class="bg-yellow-500 text-black px-6 py-2 rounded-full font-black shadow-lg">All</button>
        <button onclick="filterCategory('veg')" class="bg-green-600 px-5 py-2 rounded-full font-bold shadow-lg">🟢 Veg</button>
        <button onclick="filterCategory('nonveg')" class="bg-red-600 px-5 py-2 rounded-full font-bold shadow-lg">🔴 Non-Veg</button>
        <button onclick="filterCategory('cocktail')" class="bg-purple-600 px-5 py-2 rounded-full font-bold shadow-lg">🍸 Cocktail</button>
        <button onclick="filterCategory('mocktail')" class="bg-blue-600 px-5 py-2 rounded-full font-bold shadow-lg">🥤 Mocktail</button>
    </div>

    <div id="menu-container" class="max-w-md mx-auto px-4 space-y-10">
        </div>

    <button onclick="openAdmin()" class="fixed bottom-8 right-8 w-16 h-16 bg-yellow-500 text-black rounded-full shadow-2xl z-50 flex items-center justify-center text-3xl font-bold transition active:scale-90">
        <i class="fas fa-plus"></i>
    </button>

    <div id="adminModal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-slate-900 text-white w-full max-w-md p-8 rounded-[40px] border border-white/10 shadow-2xl">
            <h3 class="text-3xl font-black mb-6 text-yellow-400 uppercase tracking-tight">Add New Item</h3>
            <input id="n" type="text" placeholder="Dish Name (e.g. Paneer Chilli)" class="w-full bg-slate-800 p-4 rounded-2xl mb-4 outline-none border border-white/5">
            <input id="p" type="number" placeholder="Price (NPR रु)" class="w-full bg-slate-800 p-4 rounded-2xl mb-4 outline-none border border-white/5">
            <input id="i" type="text" placeholder="Photo Link (Direct URL)" class="w-full bg-slate-800 p-4 rounded-2xl mb-4 outline-none border border-white/5">
            <select id="cat" class="w-full bg-slate-800 p-4 rounded-2xl mb-8 outline-none border border-white/5 font-bold">
                <option value="veg">🟢 Veg Item</option>
                <option value="nonveg">🔴 Non-Veg Item</option>
                <option value="cocktail">🍸 Cocktail</option>
                <option value="mocktail">🥤 Mocktail</option>
            </select>
            <div class="flex gap-4">
                <button onclick="saveToSupabase()" class="bg-yellow-500 text-black w-full py-5 rounded-3xl font-black text-xl shadow-xl">SAVE ITEM</button>
                <button onclick="closeAdmin()" class="bg-slate-700 w-1/3 py-5 rounded-3xl font-bold">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://xxbuhdezzesdwgsbzrfh.supabase.co';
        const supabaseKey = 'Sb_publishable_F1fuVfJj5NLrWdcIRWK_Gg_huFnID5y';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let allDishes = [];

        async function loadMenu() {
            const { data, error } = await _supabase.from('dishes').select('*');
            if (!error) { allDishes = data; renderItems(data); }
        }

        function renderItems(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div class="relative bg-slate-900 rounded-[45px] overflow-hidden border border-white/5 shadow-2xl">
                    <img src="${item.i}" class="w-full h-72 object-cover opacity-90">
                    <div class="absolute top-6 right-6 bg-yellow-400 text-black px-6 py-2 rounded-full font-black text-xl shadow-xl">
                        रु ${item.p}
                    </div>
                    <div class="p-8 bg-gradient-to-t from-slate-950 via-slate-900/80 to-transparent">
                        <h2 class="text-3xl font-black uppercase tracking-tight">${item.n}</h2>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            if(cat === 'all') renderItems(allDishes);
            else renderItems(allDishes.filter(d => d.category === cat));
        }

        function filterMenu() {
            let val = document.getElementById('searchBar').value.toLowerCase();
            renderItems(allDishes.filter(d => d.n.toLowerCase().includes(val)));
        }

        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }

        async function saveToSupabase() {
            const n = document.getElementById('n').value;
            const p = document.getElementById('p').value;
            const i = document.getElementById('i').value;
            const category = document.getElementById('cat').value;
            
            if(n && p && i) {
                const { error } = await _supabase.from('dishes').insert([{ n, p, i, category }]);
                if (error) alert(error.message);
                else { alert("Dish Saved Successfully!"); location.reload(); }
            } else { alert("Please fill all details!"); }
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
