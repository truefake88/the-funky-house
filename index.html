<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Funky House | Bhaktapur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white pb-20 font-sans">

    <header class="text-center py-12 bg-gradient-to-b from-yellow-500/20 to-transparent px-4">
        <h1 class="text-6xl font-black text-yellow-400 uppercase tracking-tighter">THE FUNKY HOUSE</h1>
        
        <div class="mt-8 max-w-md mx-auto">
            <input type="text" id="searchBar" onkeyup="filterMenu()" placeholder="🔍 Search dish..." 
            class="w-full p-4 rounded-2xl bg-slate-800 border border-white/10 text-white outline-none focus:border-yellow-400 text-lg">
        </div>
    </header>

    <div class="flex flex-wrap justify-center gap-3 mb-10 px-4">
        <button onclick="filterCategory('all')" class="bg-yellow-500 text-black px-6 py-2 rounded-full font-bold shadow-lg">All</button>
        <button onclick="filterCategory('veg')" class="bg-green-600 px-5 py-2 rounded-full font-bold shadow-lg">🟢 Veg</button>
        <button onclick="filterCategory('nonveg')" class="bg-red-600 px-5 py-2 rounded-full font-bold shadow-lg">🔴 Non-Veg</button>
        <button onclick="filterCategory('cocktail')" class="bg-purple-600 px-5 py-2 rounded-full font-bold shadow-lg">🍸 Cocktail</button>
        <button onclick="filterCategory('mocktail')" class="bg-blue-600 px-5 py-2 rounded-full font-bold shadow-lg">🥤 Mocktail</button>
    </div>

    <div id="menu-container" class="max-w-md mx-auto px-4 space-y-10">
        </div>

    <script>
        // Supabase Connection
        const supabaseUrl = 'https://xxbuhdezzesdwgsbzrfh.supabase.co';
        const supabaseKey = 'Sb_publishable_F1fuVfJj5NLrWdcIRWK_Gg_huFnID5y';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let allDishes = [];

        async function loadMenu() {
            const { data, error } = await _supabase.from('dishes').select('*');
            if (!error) {
                allDishes = data;
                renderItems(data);
            }
        }

        function renderItems(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div class="relative bg-slate-800 rounded-[40px] overflow-hidden border border-white/5 shadow-2xl transition hover:scale-[1.02]">
                    <img src="${item.i}" class="w-full h-72 object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=The+Funky+House'">
                    <div class="absolute top-6 right-6 bg-yellow-400 text-black px-5 py-2 rounded-full font-black text-xl shadow-xl">
                        रु ${item.p}
                    </div>
                    <div class="p-8 bg-gradient-to-t from-slate-900 to-transparent">
                        <h2 class="text-3xl font-black uppercase tracking-tight">${item.n}</h2>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            if(cat === 'all') renderItems(allDishes);
            else {
                const filtered = allDishes.filter(d => d.category === cat);
                renderItems(filtered);
            }
        }

        function filterMenu() {
            let val = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allDishes.filter(d => d.n.toLowerCase().includes(val));
            renderItems(filtered);
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
